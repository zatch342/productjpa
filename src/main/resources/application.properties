spring.application.name=productjpa


#testing local computer
#server.port=8083

#for render
server.port=${PORT:8080};


#PostgreSQL DB Setting
#spring.datasource.url=jdbc:postgresql://localhost:5432/productdb
#spring.datasource.username=postgres
